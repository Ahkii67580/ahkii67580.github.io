<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kindle阅读</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: "Noto Serif SC", "SimSun", "宋体", serif;
            font-size: 22px;
            line-height: 1.8;
            max-width: 90%;
            margin: 40px auto;
            padding: 20px;
            color: #000;
            background: #fff;
        }
        
        h1 {
            font-size: 28px;
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 2px solid #000;
        }
        
        .post {
            margin: 25px 0;
            padding: 15px 0;
            border-bottom: 1px dashed #666;
        }
        
        .date {
            font-size: 16px;
            color: #333;
            margin-bottom: 5px;
        }
        
        a {
            color: #000;
            text-decoration: none;
            font-size: 24px;
        }
        
        a:hover {
            text-decoration: underline;
        }
        
        .empty {
            text-align: center;
            color: #666;
            margin: 60px 0;
        }
        
        .nav {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 2px solid #000;
            text-align: center;
            font-size: 16px;
            color: #666;
        }
    </style>
</head>
<body>
    <h1>我的阅读笔记 （by 阿杰）</h1>
    
    <div class="empty">暂无文章，请发送邮件添加</div>
    
    <div class="nav">QQ邮箱发布 | Kindle优化</div>
</body>
</html>
